<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 text-center">
            <h1 class="text-primary">🚀 Hackathon Project</h1>
            <p class="lead">Flask is running perfectly on port 5001.</p>
            <hr>
            <form action="/greet" method="POST" class="row g-3 justify-content-center">
                <div class="col-auto">
                    <input type="text" name="username" class="form-control" placeholder="Enter your name" required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Say Hello</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
